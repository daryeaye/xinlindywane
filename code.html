<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Code Dispenser</title>
  <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&family=Audiowide&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: url('https://daryeaye.github.io/stickercollection1/Mac4.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Kelly Slab', cursive;
      color: #fff;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.34);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .panel {
      width: 760px;
      max-width: 100%;
      background: rgba(15, 17, 24, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      padding: 30px 28px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 36px;
      letter-spacing: 0.5px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0 22px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      padding: 12px;
      font-size: 21px;
      line-height: 1.25;
    }

    .stat strong {
      display: block;
      font-size: 30px;
      margin-bottom: 4px;
    }

    .desc {
      margin: 0 0 24px;
      font-size: 22px;
      line-height: 1.4;
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Kelly Slab', cursive;
      background: linear-gradient(135deg, #ffd86b, #ff9f45);
      color: #1f1605;
      font-size: 28px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .message {
      min-height: 36px;
      margin-top: 16px;
      font-size: 21px;
    }

    .good { color: #9effaa; }
    .bad { color: #ffd6d6; }

    @media (max-width: 760px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 30px;
      }

      .desc, .stat, .message {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="panel">
      <h1>Sticker Code Dispenser</h1>

      <div class="stats">
        <div class="stat"><strong>20</strong>Pages</div>
        <div class="stat"><strong>7 × 7</strong>Grid</div>
        <div class="stat"><strong>49</strong>Per Page</div>
        <div class="stat"><strong>980</strong>Total Codes</div>
      </div>

      <p class="desc">Generate a PDF with 980 unique 8-letter codes.</p>

      <button id="generateBtn">Generate PDF</button>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const TOTAL_PAGES = 20;
    const ROWS = 7;
    const COLS = 7;
    const CODES_PER_PAGE = ROWS * COLS;
    const TOTAL_CODES = TOTAL_PAGES * CODES_PER_PAGE;

    const messageBox = document.getElementById('message');
    const generateBtn = document.getElementById('generateBtn');

    const charToNum = (ch) => LETTERS.indexOf(ch);
    const numToChar = (n) => LETTERS[((n % 26) + 26) % 26];

    function encodeBase26(num, length = 4) {
      let n = num;
      let out = '';
      for (let i = 0; i < length; i++) {
        out = numToChar(n % 26) + out;
        n = Math.floor(n / 26);
      }
      return out;
    }

    function computeCheckLetters(payload) {
      const p = payload.split('').map(charToNum);
      if (payload.length !== 4 || p.some(v => v < 0)) {
        throw new Error('Invalid payload');
      }

      const [p1, p2, p3, p4] = p;

      const c1 = (11 * p1 + 7 * p2 + 5 * p3 + 3 * p4 + p1 * p3 + 13) % 26;
      const c2 = (3 * p1 + 17 * p2 + 9 * p3 + 5 * p4 + p2 * p4 + 7) % 26;
      const c3 = (19 * p1 + 11 * p2 + 3 * p3 + 7 * p4 + p1 * p4 + 5) % 26;
      const c4 = (5 * p1 + 13 * p2 + 17 * p3 + 11 * p4 + p1 * p2 + p3 * p4 + 9) % 26;

      return numToChar(c1) + numToChar(c2) + numToChar(c3) + numToChar(c4);
    }

    function buildCodeFromPayload(payload) {
      return payload + computeCheckLetters(payload);
    }

    function secureRandomInt(maxExclusive) {
      if (!window.crypto || !window.crypto.getRandomValues) {
        return Math.floor(Math.random() * maxExclusive);
      }

      const maxUint = 0xFFFFFFFF;
      const limit = maxUint - (maxUint % maxExclusive);
      const arr = new Uint32Array(1);

      do {
        window.crypto.getRandomValues(arr);
      } while (arr[0] >= limit);

      return arr[0] % maxExclusive;
    }

    function generateUniqueCodes(total) {
      const payloadSet = new Set();
      const codes = [];
      const maxPayloads = Math.pow(26, 4);

      while (payloadSet.size < total) {
        const n = secureRandomInt(maxPayloads);
        if (!payloadSet.has(n)) {
          payloadSet.add(n);
          const payload = encodeBase26(n, 4);
          codes.push(buildCodeFromPayload(payload));
        }
      }

      return codes;
    }

    function buildPdf(codes) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'letter' });

      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const marginX = 12;
      const marginY = 12;
      const gapX = 6;
      const gapY = 6;
      const usableWidth = pageWidth - (2 * marginX) - ((COLS - 1) * gapX);
      const usableHeight = pageHeight - (2 * marginY) - ((ROWS - 1) * gapY);
      const cellW = usableWidth / COLS;
      const cellH = usableHeight / ROWS;

      for (let page = 0; page < TOTAL_PAGES; page++) {
        if (page > 0) doc.addPage('letter', 'landscape');

        for (let row = 0; row < ROWS; row++) {
          for (let col = 0; col < COLS; col++) {
            const index = page * CODES_PER_PAGE + row * COLS + col;
            const code = codes[index];
            const x = marginX + col * (cellW + gapX);
            const y = marginY + row * (cellH + gapY);

            doc.setDrawColor(70);
            doc.setLineWidth(0.8);
            doc.roundedRect(x, y, cellW, cellH, 7, 7);
            doc.setFont('courier', 'bold');
            doc.setFontSize(18);
            doc.text(code, x + cellW / 2, y + cellH / 2 + 6, { align: 'center' });
          }
        }
      }

      doc.save('sticker_codes_980.pdf');
    }

    generateBtn.addEventListener('click', () => {
      generateBtn.disabled = true;
      messageBox.className = 'message';
      messageBox.textContent = 'Generating 980 unique codes...';

      setTimeout(() => {
        try {
          const codes = generateUniqueCodes(TOTAL_CODES);
          buildPdf(codes);
          messageBox.className = 'message good';
          messageBox.textContent = 'Done! Your PDF has been generated.';
        } catch (error) {
          console.error(error);
          messageBox.className = 'message bad';
          messageBox.textContent = 'Something went wrong while creating the PDF.';
        } finally {
          generateBtn.disabled = false;
        }
      }, 50);
    });
  </script>
</body>
</html>
